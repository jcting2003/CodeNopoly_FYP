services:
  mysql:
    image: mysql:8.0
    container_name: codenopoly-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: codenopoly
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: secret
      MYSQL_USER: codenopoly_user
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - codenopoly-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: codenopoly-backend
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
      - backend_vendor:/var/www/vendor
    ports:
      - "8000:8000"
    environment:
      APP_DEBUG: "false"
      LOG_LEVEL: warning
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: codenopoly
      DB_USERNAME: codenopoly_user
      DB_PASSWORD: secret
      BROADCAST_DRIVER: "null"
      CACHE_DRIVER: array
      SESSION_DRIVER: cookie
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_CONNECT_TIMEOUT: 5
      OLLAMA_VALIDATION_TIMEOUT: 30
      OLLAMA_HINT_TIMEOUT: 20
    depends_on:
      - mysql
      - ollama
    networks:
      - codenopoly-network

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: codenopoly-frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./web:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - codenopoly-network
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    command: npm run dev -- --host 0.0.0.0

  ollama:
    image: ollama/ollama:latest
    container_name: codenopoly-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - codenopoly-network

volumes:
  mysql_data:
  ollama_data:
  backend_vendor:

networks:
  codenopoly-network:
    driver: bridge
